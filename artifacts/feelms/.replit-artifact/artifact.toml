kind = "web"
previewPath = "/"
title = "Feelms — Streaming Platform"
version = "1.0.0"
id = "artifacts/feelms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21809

[services.development]
run = "pnpm --filter @workspace/feelms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/feelms", "run", "build" ]
publicDir = "artifacts/feelms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21809"
BASE_PATH = "/"
